<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sūtrasthānam</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:#f7f4ef;
font-family:'Noto Serif', serif;
}

.header-box{
width:85%;
margin:30px auto;
background:#7a001f;
border:5px solid #d2b98b;
border-radius:30px;
text-align:center;
padding:35px 20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.header-box h1{
margin:0;
font-size:64px;
color:#f6ead0;
}

.header-box p{
margin-top:15px;
font-size:20px;
font-style:italic;
color:#f6ead0;
}

.subtitle{
text-align:center;
font-size:52px;
color:#8b0000;
margin-top:60px;
margin-bottom:40px;
}

.chapter-grid{
width:95%;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding-bottom:50px;
}

.chapter-card{
background:white;
border:3px solid #d2b98b;
border-radius:20px;
padding:35px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.chapter-card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.chapter-card h3{
font-size:30px;
color:#8b0000;
margin-bottom:15px;
}

.chapter-card p{
font-size:20px;
font-style:italic;
color:#666;
}

@media(max-width:900px){

.chapter-grid{
grid-template-columns:1fr;
}

.header-box h1{
font-size:42px;
}

.subtitle{
font-size:34px;
}

}

function comingSoon(){
alert("Coming Soon");
}

</style>

<script>
function comingSoon(){
alert("Coming Soon");
}
</script>

</head>

<body>

<div class="header-box">
<h1>अष्टाङ्गहृदयम्</h1>
<p>Aṣṭāṅga-Hṛdayam</p>
</div>

<div class="subtitle">
सूत्रस्थानम्
</div>

<div class="chapter-grid">

<div class="chapter-card"
onclick="window.location.href='chapters/ah-su-01.html'">
<h3>१. आयुष्कामीयम्</h3>
<p>Āyuṣkāmīyam</p>
</div>

<div class="chapter-card" onclick="comingSoon()">
<h3>२. दिनचर्याम्</h3>
<p>Dinacaryām</p>
</div>

<div class="chapter-card" onclick="comingSoon()">
<h3>३. ऋतुचर्याम्</h3>
<p>Ṛtucaryām</p>
</div>

<div class="chapter-card" onclick="comingSoon()">
<h3>४. रोगानुत्पादनीयम्</h3>
<p>Rogānutpādanīyam</p>
</div>

<div class="chapter-card" onclick="comingSoon()">
<h3>५. द्रवद्रव्यविज्ञानीयम्</h3>
<p>Dravadravyavijñānīyam</p>
</div>

<div class="chapter-card" onclick="comingSoon()">
<h3>६. अन्नस्वरूपविज्ञानीयम्</h3>
<p>Annasvarūpavijñānīyam</p>
</div>

</div>

</body>
</html>
